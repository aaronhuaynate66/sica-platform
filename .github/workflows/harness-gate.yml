name: Harness Gate

# Gate de calidad para PRs que tocan código del extractor o del harness.
# Corre extracción real (Claude Sonnet 4.5) contra un subset representativo
# de casos sintéticos, compara métricas vs baseline canónico, y bloquea el
# merge si alguna métrica viola threshold.
#
# Coste estimado: ~USD 0.10 por corrida (3 PDFs sintéticos cortos).
# Skipear el gate: agregar label "skip-harness-gate" al PR.

on:
  pull_request:
    branches: [main]
    paths:
      # Sólo dispara cuando el PR puede afectar la extracción.
      - 'services/clinical-extractor/**'
      - 'evals/**'
      - 'apps/api/**'
      - '.github/workflows/harness-gate.yml'
      - '.github/harness-thresholds.yaml'
  workflow_dispatch:
    inputs:
      cases:
        description: 'Comma-separated case IDs to evaluate'
        default: 'synthetic_case_01,synthetic_case_02_preeclampsia,synthetic_case_06_anemia_severa'
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: harness-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  DEFAULT_CASES: "synthetic_case_01,synthetic_case_02_preeclampsia,synthetic_case_06_anemia_severa"

jobs:
  harness-gate:
    name: Run harness gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip si el PR lleva el label de bypass.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-harness-gate')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install harness + extractor
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install -e ./evals
          pip install -e ./services/clinical-extractor

      - name: Resolve case list
        id: cases
        shell: bash
        run: |
          # Prioridad: input manual → env DEFAULT_CASES.
          if [ -n "${{ github.event.inputs.cases }}" ]; then
            echo "ids=${{ github.event.inputs.cases }}" >> "$GITHUB_OUTPUT"
          else
            echo "ids=${DEFAULT_CASES}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run harness gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          set -e
          cd evals
          sica-eval run \
            --cases "${{ steps.cases.outputs.ids }}" \
            --extractor real \
            --baseline "fixtures/baselines/claude_sonnet_4_5_synthetic_case_01.baseline.json" \
            --thresholds-file "../.github/harness-thresholds.yaml" \
            --output-format gate \
            --output-file "../harness-report.md" \
            --format json \
            --fail-on-regression

      - name: Read report into env
        if: always()
        id: report
        shell: bash
        run: |
          # Si el reporte no existe (fallo temprano antes de --output-file),
          # generamos un placeholder con la info del run para poder comentar.
          if [ ! -f harness-report.md ]; then
            cat > harness-report.md <<'EOF'
          # 📊 Harness Gate Report

          ⚠️ No se generó reporte del gate. Probablemente el job falló antes
          de la evaluación (instalación, autenticación, o ejecución del
          extractor). Revisar los logs del job para detalle.
          EOF
          fi
          # Truncamos a 60KB para evitar problemas con el límite de
          # tamaño de comentarios de GitHub.
          head -c 60000 harness-report.md > harness-report.trimmed.md

      - name: Comment on PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('harness-report.trimmed.md', 'utf8');
            const marker = '<!-- sica-harness-gate -->';
            const opts = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            };
            // Encontrar comment previo del gate (si existe) y editarlo.
            const comments = await github.rest.issues.listComments(opts);
            const prev = comments.data.find(c => c.body && c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (prev) {
              await github.rest.issues.updateComment({
                ...opts,
                comment_id: prev.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                ...opts,
                body: fullBody,
              });
            }

      - name: Manage harness-failure label
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const jobFailed = '${{ job.status }}' !== 'success';
            const labelName = 'harness-failure';
            const opts = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            };
            const labels = await github.rest.issues.listLabelsOnIssue(opts);
            const has = labels.data.some(l => l.name === labelName);
            if (jobFailed && !has) {
              await github.rest.issues.addLabels({ ...opts, labels: [labelName] });
              core.info(`Aplicado label "${labelName}" al PR.`);
            } else if (!jobFailed && has) {
              await github.rest.issues.removeLabel({ ...opts, name: labelName });
              core.info(`Removido label "${labelName}" del PR (el gate volvió a pasar).`);
            }

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-report-${{ github.run_id }}
          path: |
            harness-report.md
            evals/reports/**
          retention-days: 30
