name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela corridas previas de la misma branch cuando llega un push nuevo
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # =========================================================================
  # lint-node — corre solo si hay package.json en apps/ o packages/
  # En R0 el monorepo todavía no tiene apps/packages reales, así que este
  # job hace early-exit con éxito. Cuando aparezca el primer package real,
  # el step de "detect" se vuelve true y el lint se ejecuta.
  # =========================================================================
  lint-node:
    name: Lint (Node/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar paquetes Node
        id: detect
        shell: bash
        run: |
          if find apps packages -mindepth 2 -name 'package.json' -print -quit 2>/dev/null | grep -q .; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
            echo "Found Node packages — running lint."
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
            echo "No Node packages found in apps/ or packages/ — skipping lint (success)."
          fi

      - name: Setup pnpm
        if: steps.detect.outputs.has_node == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.detect.outputs.has_node == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.detect.outputs.has_node == 'true'
        run: pnpm lint

      - name: Type check
        if: steps.detect.outputs.has_node == 'true'
        run: pnpm type-check

  # =========================================================================
  # lint-python — corre solo si hay pyproject.toml en services/
  # Ejecuta ruff + mypy sobre cada servicio Python.
  # =========================================================================
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar servicios Python
        id: detect
        shell: bash
        run: |
          if find services -mindepth 2 -name 'pyproject.toml' -print -quit 2>/dev/null | grep -q .; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
            echo "Found Python services — running lint + type check."
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
            echo "No Python services found in services/ — skipping (success)."
          fi

      - name: Setup Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install lint tooling
        if: steps.detect.outputs.has_python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff check
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -e
          for svc in services/*/pyproject.toml; do
            dir="$(dirname "$svc")"
            echo "::group::ruff $dir"
            (cd "$dir" && ruff check .)
            echo "::endgroup::"
          done

      - name: Install service deps + mypy
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -e
          for svc in services/*/pyproject.toml; do
            dir="$(dirname "$svc")"
            echo "::group::install $dir"
            (cd "$dir" && pip install -e ".[dev]" || pip install -e .)
            echo "::endgroup::"
          done

      - name: Mypy
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -e
          for svc in services/*/pyproject.toml; do
            dir="$(dirname "$svc")"
            echo "::group::mypy $dir"
            (cd "$dir" && mypy src) || true  # mypy advisory en R0; se vuelve obligatorio en R1
            echo "::endgroup::"
          done
