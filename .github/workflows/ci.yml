name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela corridas previas de la misma branch cuando llega un push nuevo
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # =========================================================================
  # lint-node — corre solo si hay package.json en apps/ o packages/
  # En R0 el monorepo todavía no tiene apps/packages reales, así que este
  # job hace early-exit con éxito. Cuando aparezca el primer package real,
  # el step de "detect" se vuelve true y el lint se ejecuta.
  # =========================================================================
  lint-node:
    name: Lint (Node/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar paquetes Node
        id: detect
        shell: bash
        run: |
          if find apps packages -mindepth 2 -name 'package.json' -print -quit 2>/dev/null | grep -q .; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
            echo "Found Node packages — running lint."
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
            echo "No Node packages found in apps/ or packages/ — skipping lint (success)."
          fi

      - name: Setup pnpm
        if: steps.detect.outputs.has_node == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.detect.outputs.has_node == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.detect.outputs.has_node == 'true'
        run: pnpm lint

      - name: Type check
        if: steps.detect.outputs.has_node == 'true'
        run: pnpm type-check

  # =========================================================================
  # lint-python — corre sobre todos los paquetes Python del monorepo.
  # Ejecuta ruff + mypy + pytest sobre cada uno.
  #
  # Paquetes auto-detectados: cualquier pyproject.toml bajo services/ +
  # evals/ (paquete top-level). Si en el futuro se agrega otro paquete
  # Python en otro path, extender la variable PKG_DIRS abajo.
  # =========================================================================
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Lista explícita de directorios con pyproject.toml a lintear/testear.
      # Mantener sincronizada con la realidad del monorepo. Auto-detectar
      # con `find` sería más limpio pero menos auditable — esta lista
      # explícita obliga a un commit cuando se agrega un paquete nuevo.
      PKG_DIRS: "services/clinical-extractor evals"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar paquetes Python
        id: detect
        shell: bash
        run: |
          found="false"
          for dir in $PKG_DIRS; do
            if [ -f "$dir/pyproject.toml" ]; then
              found="true"
              echo "  ✓ $dir/pyproject.toml"
            else
              echo "::warning::$dir/pyproject.toml no existe — skip"
            fi
          done
          echo "has_python=$found" >> "$GITHUB_OUTPUT"
          if [ "$found" = "false" ]; then
            echo "No Python packages found — skipping (success)."
          fi

      - name: Setup Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install lint tooling
        if: steps.detect.outputs.has_python == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest

      - name: Ruff check
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -e
          for dir in $PKG_DIRS; do
            [ -f "$dir/pyproject.toml" ] || continue
            echo "::group::ruff $dir"
            (cd "$dir" && ruff check .)
            echo "::endgroup::"
          done

      - name: Install package deps
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -e
          for dir in $PKG_DIRS; do
            [ -f "$dir/pyproject.toml" ] || continue
            echo "::group::install $dir"
            (cd "$dir" && pip install -e ".[dev]" || pip install -e .)
            echo "::endgroup::"
          done

      - name: Mypy
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        # Mypy es obligatorio: cualquier error de type-checking rompe CI.
        # Promovido de advisory (R0) a mandatory — los paquetes listados en
        # PKG_DIRS pasan mypy --strict con 0 errores al momento de la
        # promoción. Si un paquete nuevo se agrega a PKG_DIRS, debe entrar
        # limpio o quedarse fuera hasta que lo esté.
        run: |
          set -e
          for dir in $PKG_DIRS; do
            [ -f "$dir/pyproject.toml" ] || continue
            echo "::group::mypy $dir"
            (cd "$dir" && mypy src)
            echo "::endgroup::"
          done

      - name: Pytest
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -e
          for dir in $PKG_DIRS; do
            [ -f "$dir/pyproject.toml" ] || continue
            # Skip si no hay tests/ — paquetes nuevos pueden no tenerlos aún.
            [ -d "$dir/tests" ] || { echo "$dir sin tests/ — skip"; continue; }
            echo "::group::pytest $dir"
            (cd "$dir" && pytest)
            echo "::endgroup::"
          done
