# =========================================================================
# Render — Infrastructure-as-Code para sica-platform
# Documentación: https://render.com/docs/blueprint-spec
# Cómo conectar: ver apps/api/RENDER.md
# =========================================================================

services:
  - type: web
    name: sica-api
    runtime: python
    region: oregon
    plan: free
    rootDir: apps/api
    # El extractor vive en services/clinical-extractor (workspace local, no en
    # PyPI). Lo instalamos por path antes que sica-api para que las rutas que
    # lo importan (/providers, /models con runtime state, /extract) lo
    # encuentren en el entorno de prod. Sin este install /health miente
    # (reporta extractor_available=true cuando el módulo no está cargado).
    #
    # Decisiones:
    # - **Path absoluto** `/opt/render/project/src/services/clinical-extractor`:
    #   es el mount point canónico de Render para el repo checkeado. No depende
    #   de `$PWD`, ni del shell (sh vs bash), ni de cómo Render resuelva el
    #   rootDir. Es exactamente el path que actualmente funciona en producción
    #   (configurado en el campo Build Command de la UI de Render — ver ADR
    #   0006 sobre la precedencia UI > render.yaml).
    # - **One-liner con `&&`**: fail-fast implícito. Si pip install del extractor
    #   falla, el `&&` corta y el deploy aborta. No necesitamos `set -e` ni
    #   sanity check post-install — el install de `sica-api` que sigue va a
    #   fallar si el extractor no quedó disponible como dependencia transitiva.
    # - **Sin `-e`** para clinical-extractor: editable installs con paths fuera
    #   del rootDir pueden dejar egg-links frágiles. Instalación non-editable
    #   produce un wheel real en site-packages.
    #
    # ADR 0006: este buildCommand está sincronizado con lo que la UI de Render
    # ejecuta hoy, pero render.yaml está siendo IGNORADO mientras el campo
    # Build Command de la UI tenga un valor. Plan de remediación: vaciar el
    # campo de UI en sesión controlada → render.yaml pasa a ser fuente de
    # verdad. Ver docs/decisions/0006-render-config-precedence.md.
    buildCommand: "pip install --upgrade pip && pip install /opt/render/project/src/services/clinical-extractor && pip install -e ."
    startCommand: uvicorn sica_api.main:app --host 0.0.0.0 --port $PORT
    pythonVersion: "3.13"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Anthropic API key — secret, se setea manualmente en Render UI.
      # NUNCA commitear el valor real.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_FILE_SIZE_MB
        value: "10"
      # Orígenes literales permitidos por CORS. Para patrones (preview
      # deploys *.vercel.app) usar ALLOWED_ORIGIN_REGEX — ver settings.py.
      - key: ALLOWED_ORIGINS
        value: "https://sica-web.vercel.app,https://*.vercel.app,http://localhost:3000"
      # Regex de orígenes — cubre cualquier subdominio de vercel.app
      # (preview deploys con hash). Refinar con dominio de producción
      # cuando exista.
      - key: ALLOWED_ORIGIN_REGEX
        value: "^https://([a-z0-9-]+\\.)*vercel\\.app$"
